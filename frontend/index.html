</div></div><script>const API_URL = "https://api.siliconflow.cn/v1/chat/completions";
const MODEL_NAME = "deepseek-ai/DeepSeek-R1-0528-Qwen3-8B";
const SYSTEM_PROMPT = "你是UE蓝图设计助手。将用户需求转化为蓝图节点JSON。必须输出纯JSON，不含其他文字。\n\nJSON格式：\n{\n  \"nodes\": [\n    {\"id\":\"唯一ID\",\"type\":\"节点类型\",\"label\":\"显示名\",\"x\":0,\"y\":0,\"color\":\"#颜色\",\"inputs\":[{\"name\":\"引脚名\",\"type\":\"类型\"}],\"outputs\":[{\"name\":\"引脚名\",\"type\":\"类型\"}],\"properties\":{}}\n  ],\n  \"connections\": [{\"fromNode\":\"源ID\",\"fromPin\":\"源引脚\",\"toNode\":\"目标ID\",\"toPin\":\"目标引脚\"}],\n  \"variables\": [{\"name\":\"变量名\",\"type\":\"类型\",\"defaultValue\":\"默认值\",\"description\":\"说明\"}],\n  \"description\": \"逻辑说明\"\n}\n\n节点类型：EventBeginPlay, EventTick, SetVariable, GetVariable, Branch, PrintString, PlaySound, SpawnActor, DestroyActor, AddActorWorldOffset, Delay, Loop, CastTo\n\n颜色：事件#1a1a2e, 变量#16213e, 逻辑#0f3460, 函数#533483, 运算#e94560\n\n必须生成至少8个节点，包含循环和条件分支。";

const NODE_DESCRIPTIONS = {
    "EventBeginPlay": {
        name: "游戏开始事件",
        description: "当游戏开始或Actor生成时触发一次。常用于初始化变量、设置初始状态。",
        category: "事件节点",

    },
    "EventTick": {
        name: "每帧更新事件",
        description: "每帧触发一次（通常60次/秒）。用于需要持续检测或更新的逻辑。",
        category: "事件节点",
        example: "检测输入、更新位置、持续伤害"
    },
    "EventActorBeginOverlap": {
        name: "碰撞开始事件",
        description: "当Actor与其他物体开始重叠时触发。用于碰撞检测、拾取物品。",

    "InputAction": {
        name: "输入动作事件",
        description: "当玩家按下特定按键时触发。用于响应键盘、鼠标、手柄输入。",

    "SetVariable": {
        name: "设置变量",
        description: "设置变量的值。可以初始化或修改变量。",
        category: "变量节点",

    },
    "GetVariable": {
        name: "获取变量",
        description: "读取变量的当前值。用于条件判断或计算。",
        category: "变量节点",
        example: "检查生命值、获取玩家位置"
    },
    "Branch": {
        name: "条件分支",
        description: "根据布尔条件选择执行路径。True走一个分支，False走另一个。",
        category: "逻辑节点",
        example: "生命值<=0?、是否在地面?、背包是否已满?"
    },
    "Loop": {
        name: "循环",
        description: "重复执行指定次数。每次循环执行Loop Body，完成后执行Then。",
        category: "逻辑节点",
        example: "生成多个敌人、批量处理物品"
    },
    "Delay": {
        name: "延迟",
        description: "暂停执行指定时间（秒）。用于计时、冷却、动画等待。",
        category: "运算节点",
        example: "等待3秒后生成敌人、技能冷却"
    },
    "PrintString": {
        name: "打印字符串",
        description: "在屏幕上显示文本。用于调试、提示信息、游戏状态显示。",
        category: "函数节点",
        example: "显示分数、调试输出、游戏提示"
    },
    "PlaySound": {
        name: "播放音效",
        description: "播放指定的声音资源。用于背景音乐、音效、语音。",
        category: "函数节点",
        example: "跳跃音效、攻击音效、背景音乐"
    },
    "SpawnActor": {
        name: "生成Actor",
        description: "在指定位置创建新的Actor对象。用于动态生成游戏对象。",
        category: "函数节点",
        example: "生成敌人、创建子弹、放置防御塔"
    },
    "DestroyActor": {
        name: "销毁Actor",
        description: "从游戏中移除Actor对象。用于敌人死亡、物品消耗、清理对象。",
        category: "函数节点",
        example: "敌人死亡、物品使用后消失、子弹命中"
    },
    "AddActorWorldOffset": {
        name: "添加世界偏移",
        description: "移动Actor的位置。用于角色移动、跳跃、物体位移。",
        category: "函数节点",
        example: "角色跳跃、敌人移动、平台升降"
    },
    "CastTo": {
        name: "类型转换",
        description: "将对象转换为特定类型。成功时执行Success，失败执行Failure。",
        category: "运算节点",
        example: "检测碰撞对象类型、区分敌人和道具"
    }
};

const canvas = document.getElementById("canvas");
const canvasContainer = document.getElementById("canvas-container");
const promptInput = document.getElementById("prompt-input");
const apiKeyInput = document.getElementById("api-key-input");
const generateBtn = document.getElementById("generate-btn");
const loadingOverlay = document.getElementById("loading-overlay");
const messageArea = document.getElementById("message-area");
const variablesList = document.getElementById("variables-list");
const nodeCount = document.getElementById("node-count");
let currentBlueprint = null;
let zoom = 1;
let isDragging = false;
let dragOffset = { x: 0, y: 0 };
let canvasOffset = { x: 0, y: 0 };
let selectedNode = null;
let history = JSON.parse(localStorage.getItem("blueprintHistory") || "[]");
async function generateBlueprint() {
    const prompt = promptInput.value.trim();
    if (!prompt) { showMessage("请输入需求描述"); return; }
    loadingOverlay.style.display = "flex";
    generateBtn.disabled = true;
    showMessage("分析需求...");
    
    const apiKey = apiKeyInput.value.trim();
    let blueprint = null;
    
    if (apiKey) {
        showMessage("AI生成中...");
        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Authorization": "Bearer " + apiKey, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: MODEL_NAME,
                    messages: [{ role: "system", content: SYSTEM_PROMPT }, { role: "user", content: prompt }],
                    temperature: 0.7
                })
            });
            if (!response.ok) throw new Error("API失败: " + response.status);
            const data = await response.json();
            const aiResponse = data.choices[0].message.content;
            blueprint = parseBlueprintJson(aiResponse);
        } catch (error) {
            console.error("AI调用失败:", error);
            showMessage("AI调用失败，使用本地规则引擎");
        }
    }
    
    if (!blueprint) {
        const logicElements = analyzeGameLogic(prompt);
        console.log("本地分析结果:", logicElements);
        showMessage("生成流程图...");
        blueprint = generateBlueprintFromAIAnalysis(prompt, logicElements);
    }
    
    blueprint = validateAndFixBlueprint(blueprint);
    currentBlueprint = blueprint;
    renderBlueprint(blueprint);
    updateVariablesPanel(blueprint.variables);
    saveToHistory(prompt, blueprint);
    showMessage("完成 - " + blueprint.nodes.length + " 节点");
    
    loadingOverlay.style.display = "none";
    generateBtn.disabled = false;
}

function analyzeGameLogic(text) {
    const elements = {
        events: [],
        variables: [],
        conditions: [],
        actions: [],
        loops: [],
        branches: []
    };
    
    const eventPatterns = {
        '游戏开始': ['开始', '初始化', '启动', '开始时', '游戏开始'],
        '每帧更新': ['每帧', '持续', '实时', '不断', '每一帧', 'tick'],
        '碰撞触发': ['碰撞', '接触', '碰到', '触发', '重叠', '碰到', '接触'],
        '按键输入': ['按键', '按下', '点击', '输入', '键盘', '鼠标', '按'],
        '定时器': ['定时', '计时', '倒计时', '每隔', '每秒', '每分钟', '秒', '延迟'],
        '敌人进入': ['敌人进入', '敌人出现', '敌人到达', '敌人移动'],
        '攻击触发': ['攻击', '发射', '开火', '攻击触发']
    };
    
    const variablePatterns = {
        '生命值': ['生命', '血量', 'HP', '健康', '生命上限'],
        '速度': ['速度', '移动速度', '速率', '移动'],
        '分数': ['分数', '积分', '得分', '点数', '分数'],
        '波次': ['波', '回合', '轮次', '关卡', '波数'],
        '敌人数量': ['敌人数量', '敌人数', '怪物数', '敌人'],
        '背包容量': ['背包', '物品栏', '容量', '库存'],
        '等级': ['等级', '级别', 'LV', 'level', '升级'],
        '时间': ['时间', '计时', '秒', '分钟'],
        '能量': ['能量', '魔力', 'MP', '法力', '能量值'],
        '金币': ['金币', '金钱', '货币', '钱', '金币数', '花费', '购买'],
        '经验': ['经验', 'EXP', '经验值', '经验条'],
        '防御塔': ['防御塔', '塔', '炮塔', '炮台', '放置'],
        '路径': ['路径', '路线', '移动路径'],
        '伤害': ['伤害', '攻击力', '攻击', '伤害值'],
        '距离': ['距离', '范围', '射程'],
        '数量': ['数量', '计数', '总数']
    };
    
    const conditionPatterns = {
        '生命值<=0': ['生命值小于', '血量为0', '死亡', '生命<=0', 'HP<=0', '生命为0'],
        '速度>100': ['速度超过', '速度大于', '速度>', '速度达到'],
        '背包已满': ['背包满', '容量满', '无法拾取', '已满'],
        '在地面': ['在地面', '着地', '落地', '地面'],
        '胜利': ['胜利', '通关', '完成', '成功', '胜利条件'],
        '失败': ['失败', '结束', '游戏结束', '死亡', '失败条件'],
        '波次>=5': ['波次达到', '回合达到', '波>=', '完成波次'],
        '敌人到达终点': ['敌人到达', '到达终点', '进入终点'],
        '金币足够': ['金币足够', '金钱足够', '足够购买'],
        '经验满': ['经验满', '升级', '经验值满', '升级条件'],
        '范围内有敌人': ['范围内', '敌人在', '附近有敌人']
    };
    
    const actionPatterns = {
        '跳跃': ['跳跃', '跳', '起跳', '弹跳', '跳跃动作'],
        '攻击': ['攻击', '打击', '伤害', '造成伤害', '攻击敌人'],
        '生成敌人': ['生成敌人', '创建敌人', '产生敌人', '刷怪', '敌人出现'],
        '播放音效': ['播放', '音效', '声音', '音乐', '播放声音'],
        '恢复生命': ['恢复', '治疗', '回血', '加血', '恢复生命'],
        '移动': ['移动', '位移', '行走', '跑步', '沿路径'],
        '加速': ['加速', '提升速度', '增速', '加速移动'],
        '减速': ['减速', '降低速度', '减速', '速度减半'],
        '拾取': ['拾取', '捡起', '获取', '收集', '拿到'],
        '使用物品': ['使用', '消耗', '使用物品', '使用技能'],
        '销毁': ['销毁', '删除', '移除', '消失', '死亡'],
        '延迟': ['延迟', '等待', '暂停', '延时', '等待时间'],
        '放置防御塔': ['放置', '建造', '放置塔', '建造塔'],
        '发射子弹': ['发射', '开火', '发射子弹', '攻击'],
        '扣血': ['扣血', '减少生命', '伤害', '受到伤害'],
        '增加金币': ['增加金币', '获得金币', '金币+', '获得钱'],
        '升级': ['升级', '提升', '等级+', '升级等级'],
        '购买': ['购买', '花费', '消费', '购买物品']
    };
    
    const loopPatterns = ['循环', '重复', '每隔', '每秒', '每帧', '持续', '不断', '每波', '每轮'];
    const branchPatterns = ['如果', '当', '判断', '条件', '否则', '或者', '如果', '是否'];
    
    // 分析事件
    for (const [event, patterns] of Object.entries(eventPatterns)) {
        if (patterns.some(p => text.includes(p))) {
            elements.events.push(event);
        }
    }
    
    // 分析变量
    for (const [variable, patterns] of Object.entries(variablePatterns)) {
        if (patterns.some(p => text.includes(p))) {
            elements.variables.push(variable);
        }
    }
    
    // 分析条件
    for (const [condition, patterns] of Object.entries(conditionPatterns)) {
        if (patterns.some(p => text.includes(p))) {
            elements.conditions.push(condition);
        }
    }
    
    // 分析动作
    for (const [action, patterns] of Object.entries(actionPatterns)) {
        if (patterns.some(p => text.includes(p))) {
            elements.actions.push(action);
        }
    }
    
    // 分析循环
    if (loopPatterns.some(p => text.includes(p))) {
        const loopMatch = text.match(/(\d+)[次秒]/);
        if (loopMatch) {
            elements.loops.push(`循环${loopMatch[1]}次`);
        } else {
            elements.loops.push('循环');
        }
    }
    
    // 分析分支
    if (branchPatterns.some(p => text.includes(p))) {
        elements.branches.push('条件判断');
    }
    
    // 智能推断：如果提到数字，可能是循环次数或条件阈值
    const numbers = text.match(/\d+/g);
    if (numbers) {
        numbers.forEach(num => {
            if (parseInt(num) > 0 && parseInt(num) < 100) {
                if (text.includes('圈') || text.includes('波') || text.includes('次')) {
                    if (!elements.loops.includes(`循环${num}次`)) {
                        elements.loops.push(`循环${num}次`);
                    }
                }
            }
        });
    }
    
    return elements;
}

function generateBlueprintFromAIAnalysis(prompt, elements) {
    const nodes = [];
    const connections = [];
    const variables = [];
    let nextId = 1;
    let x = 50;
    let y = 50;
    const nodeW = 180;
    const nodeH = 80;

function autoLayoutNodes(blueprint) {
    const nodeWidth = 180;
    const nodeHeight = 80;
    const horizontalGap = 80;
    const verticalGap = 60;
    
    let currentX = 50;
    let currentY = 100;
    let columnCount = 0;
    
    blueprint.nodes.forEach((node, index) => {
        if (index === 0) {
            node.x = 50;
            node.y = 50;
            currentY = 150;
            return;
        }
        
        if (currentY > 700) {
            currentX += nodeWidth + horizontalGap;
            currentY = 50;
            columnCount++;
        }
        
        node.x = currentX;
        node.y = currentY;
        currentY += nodeHeight + verticalGap;
    });
    
    return blueprint;
}

function parseBlueprintJson(text) {
    try {
        let jsonStr = text;
        const match = jsonStr.match(/\\{[\\s\\S]*\\}/);
        if (match) jsonStr = match[0];
        return JSON.parse(jsonStr);
    } catch (e) {
        return generateFallbackBlueprint(text);
    }
}

function generateFallbackBlueprint(text) {
    return {
        nodes: [
            { id: "event_1", type: "EventBeginPlay", label: "Event BeginPlay", x: 50, y: 100, color: "#1a1a2e", inputs: [], outputs: [{ name: "Then", type: "Execution" }], properties: {} },

        ],
        connections: [{ fromNode: "event_1", fromPin: "Then", toNode: "print_1", toPin: "In" }],
        variables: [],

    };
}

function validateAndFixBlueprint(bp) {
    if (!bp.nodes) bp.nodes = [];
    if (!bp.connections) bp.connections = [];
    if (!bp.variables) bp.variables = [];
    
    const w = 200, h = 80, hg = 60, vg = 40;
    
    const nodeMap = new Map();
    bp.nodes.forEach(n => nodeMap.set(n.id, n));
    
    const inDegree = new Map();
    bp.nodes.forEach(n => inDegree.set(n.id, 0));
    bp.connections.forEach(c => {
        if (inDegree.has(c.toNode)) {
            inDegree.set(c.toNode, inDegree.get(c.toNode) + 1);
        }
    });
    
    const levels = new Map();
    const queue = [];
    
    bp.nodes.forEach(n => {
        if (inDegree.get(n.id) === 0) {
            queue.push(n);
            levels.set(n.id, 0);
        }
    });
    
    if (queue.length === 0 && bp.nodes.length > 0) {
        const startNode = bp.nodes[0];
        queue.push(startNode);
        levels.set(startNode.id, 0);
    }
    
    const processed = new Set();
    while (queue.length > 0) {
        const node = queue.shift();
        if (processed.has(node.id)) continue;
        processed.add(node.id);
        
        const currentLevel = levels.get(node.id);
        const outgoing = bp.connections.filter(c => c.fromNode === node.id);
        
        outgoing.forEach(c => {
            const target = nodeMap.get(c.toNode);
            if (target) {
                const newLevel = currentLevel + 1;
                if (!levels.has(target.id) || levels.get(target.id) < newLevel) {
                    levels.set(target.id, newLevel);
                }
                
                const targetInDegree = bp.connections.filter(cc => cc.toNode === target.id).length;
                const processedFrom = bp.connections.filter(cc => 
                    cc.toNode === target.id && processed.has(cc.fromNode)
                ).length;
                
                if (processedFrom >= targetInDegree) {
                    queue.push(target);
                }
            }
        });
    }
    
    bp.nodes.forEach(n => {
        if (!levels.has(n.id)) {
            const maxLevel = Math.max(0, ...Array.from(levels.values()));
            levels.set(n.id, maxLevel + 1);
        }
    });
    
    const levelGroups = new Map();
    levels.forEach((level, nodeId) => {
        if (!levelGroups.has(level)) {
            levelGroups.set(level, []);
        }
        levelGroups.get(level).push(nodeMap.get(nodeId));
    });
    
    const sortedLevels = Array.from(levelGroups.keys()).sort((a, b) => a - b);
    
    sortedLevels.forEach((level) => {
        const nodesInLevel = levelGroups.get(level);
        const totalHeight = nodesInLevel.length * (h + vg);
        const startY = Math.max(50, 400 - totalHeight / 2);
        
        nodesInLevel.forEach((node, index) => {
            node.x = 50 + level * (w + hg);
            node.y = startY + index * (h + vg);
        });
    });
    
    const ids = new Set(bp.nodes.map(n => n.id));
    bp.connections = bp.connections.filter(c => ids.has(c.fromNode) && ids.has(c.toNode));
    
    return bp;
}

        });
    });
    nodeCount.textContent = bp.nodes.length;
    
    if (!isDragging) {
        fitCanvasToNodes(bp);
    }
}

function fitCanvasToNodes(bp) {
    if (!bp || !bp.nodes || bp.nodes.length === 0) return;
    
    const containerWidth = canvasContainer.clientWidth;
    const containerHeight = canvasContainer.clientHeight;
    
    let minX = Infinity, maxX = -Infinity;
    let minY = Infinity, maxY = -Infinity;
    
    bp.nodes.forEach(node => {
        minX = Math.min(minX, node.x);
        maxX = Math.max(maxX, node.x + 160);
        minY = Math.min(minY, node.y);
        maxY = Math.max(maxY, node.y + 80);
    });
    
    const contentWidth = maxX - minX;
    const contentHeight = maxY - minY;
    
    const padding = 50;
    
    const scaleX = (containerWidth - padding * 2) / Math.max(contentWidth, 1);
    const scaleY = (containerHeight - padding * 2) / Math.max(contentHeight, 1);
    
    zoom = Math.max(0.1, Math.min(1.5, Math.min(scaleX, scaleY)));
    
    const centerX = containerWidth / 2;
    const centerY = containerHeight / 2;
    const contentCenterX = minX + contentWidth / 2;
    const contentCenterY = minY + contentHeight / 2;
    
    canvasOffset.x = centerX - contentCenterX * zoom;
    canvasOffset.y = centerY - contentCenterY * zoom;
    
    canvas.style.transform = "translate(" + canvasOffset.x + "px," + canvasOffset.y + "px) scale(" + zoom + ")";
    document.getElementById("zoom-level").textContent = Math.round(zoom * 100) + "%";
}

function updateVariablesPanel(vars) {
    variablesList.innerHTML = "";
    if (!vars || vars.length === 0) {
        variablesList.innerHTML = "<p style='color:#666;font-size:12px'>暂无变量</p>";
        return;
    }
    vars.forEach(v => {
        const item = document.createElement("div");
        item.className = "variable-item";
        item.innerHTML = "<span class='variable-name'>" + v.name + "</span><span class='variable-type'>" + v.type + "</span>";
        variablesList.appendChild(item);
    });
}

function saveToHistory(prompt, bp) {
    const entry = { id: Date.now().toString(), timestamp: Date.now(), prompt: prompt, blueprint: bp };
    history.unshift(entry);
    if (history.length > 20) history = history.slice(0, 20);
    localStorage.setItem("blueprintHistory", JSON.stringify(history));
}
function showHistory() {
    const panel = document.getElementById("history-panel");
    const list = document.getElementById("history-list");
    if (panel.style.display === "block") { panel.style.display = "none"; return; }
    list.innerHTML = "";
    if (history.length === 0) {
        list.innerHTML = "<p style='color:#666;font-size:12px'>暂无记录</p>";
    } else {
        history.forEach(e => {
            const item = document.createElement("div");
            item.className = "history-item";
            item.textContent = e.prompt.substring(0, 50) + (e.prompt.length > 50 ? "..." : "");
            item.addEventListener("click", () => {
                currentBlueprint = e.blueprint;
                renderBlueprint(e.blueprint);
                updateVariablesPanel(e.blueprint.variables);
                promptInput.value = e.prompt;
                panel.style.display = "none";
            });
            list.appendChild(item);
        });
    }
    panel.style.display = "block";
}

function exportJSON() {
    if (!currentBlueprint) { showMessage("请先生成蓝图"); return; }
    const data = JSON.stringify(currentBlueprint, null, 2);
    downloadFile(data, "blueprint.json", "application/json");
}

function exportMarkdown() {
    if (!currentBlueprint) { showMessage("请先生成蓝图"); return; }
    let md = "# UE蓝图逻辑说明\\n\\n## 需求描述\\n" + promptInput.value + "\\n\\n## 逻辑说明\\n" + (currentBlueprint.description || "暂无") + "\\n\\n## 变量列表\\n";
    if (!currentBlueprint.variables || currentBlueprint.variables.length === 0) {
        md += "无\\n";
    } else {
        md += "|变量名|类型|默认值|说明|\\n|------|------|--------|------|\\n";
        currentBlueprint.variables.forEach(v => {
            md += "|" + v.name + "|" + v.type + "|" + (v.defaultValue || "-") + "|" + (v.description || "-") + "|\\n";
        });
    }
    md += "\\n## 节点列表\\n|ID|类型|标签|\\n|----|------|------|\\n";
    currentBlueprint.nodes.forEach(n => {
        md += "|" + n.id + "|" + n.type + "|" + n.label + "|\\n";
    });
    downloadFile(md, "blueprint.md", "text/markdown");
    showMessage("Markdown导出完成");
}

function downloadFile(content, filename, type) {
    const blob = new Blob([content], { type: type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

function clearCanvas() {
    canvas.innerHTML = "";
    currentBlueprint = null;
    variablesList.innerHTML = "<p style='color:#666;font-size:12px'>暂无变量</p>";
    nodeCount.textContent = "0";
    showMessage("画布已清空");
}

function showMessage(msg) { messageArea.textContent = msg; }

function zoomCanvas(delta) {
    zoom = Math.max(0.25, Math.min(3, zoom + delta));
    canvas.style.transform = "translate(" + canvasOffset.x + "px," + canvasOffset.y + "px) scale(" + zoom + ")";
    document.getElementById("zoom-level").textContent = Math.round(zoom * 100) + "%";
}

canvasContainer.addEventListener("wheel", e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.05 : 0.05;
    const rect = canvasContainer.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    
    const oldZoom = zoom;
    zoom = Math.max(0.25, Math.min(3, zoom + delta));
    
    canvasOffset.x = mouseX - (mouseX - canvasOffset.x) * (zoom / oldZoom);
    canvasOffset.y = mouseY - (mouseY - canvasOffset.y) * (zoom / oldZoom);
    
    canvas.style.transform = "translate(" + canvasOffset.x + "px," + canvasOffset.y + "px) scale(" + zoom + ")";
    document.getElementById("zoom-level").textContent = Math.round(zoom * 100) + "%";
}, { passive: false });

canvasContainer.addEventListener("mousedown", e => {
    if (e.target === canvasContainer || e.target === canvas) {
        isDragging = true;
        const rect = canvas.getBoundingClientRect();
        dragOffset.x = e.clientX - rect.left - canvasOffset.x;
        dragOffset.y = e.clientY - rect.top - canvasOffset.y;
    }
});

document.addEventListener("mousemove", e => {
    if (!isDragging) return;
    const rect = canvasContainer.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    if (selectedNode && currentBlueprint) {
        const node = currentBlueprint.nodes.find(n => n.id === selectedNode.id);
        if (node) {
            node.x = Math.max(0, (mouseX - canvasOffset.x - dragOffset.x) / zoom);
            node.y = Math.max(0, (mouseY - canvasOffset.y - dragOffset.y) / zoom);
            renderBlueprint(currentBlueprint);
        }
    } else {
        canvasOffset.x = mouseX - dragOffset.x;
        canvasOffset.y = mouseY - dragOffset.y;
        canvas.style.transform = "translate(" + canvasOffset.x + "px," + canvasOffset.y + "px) scale(" + zoom + ")";
    }
});

document.addEventListener("mouseup", () => { isDragging = false; selectedNode = null; });
document.getElementById("zoom-in").addEventListener("click", () => zoomCanvas(0.1));
document.getElementById("zoom-out").addEventListener("click", () => zoomCanvas(-0.1));
generateBtn.addEventListener("click", generateBlueprint);
document.getElementById("export-json").addEventListener("click", exportJSON);
document.getElementById("export-markdown").addEventListener("click", exportMarkdown);
document.getElementById("show-history").addEventListener("click", showHistory);
document.getElementById("clear-canvas").addEventListener("click", clearCanvas);
